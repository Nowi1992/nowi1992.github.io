<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calcetas y Tazas Personalizadas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#111,#2b2b2b);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;

}

.card{

width:390px;
background:white;
border-radius:28px;
padding:35px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.35);

}

.logo{

width:150px;
margin-bottom:20px;

}

h1{

font-size:40px;
color:#222;

}

h2{

font-size:26px;
color:#C79A1B;
margin-top:5px;
margin-bottom:20px;

}

.descripcion{

font-size:18px;
color:#666;
line-height:1.6;
margin-bottom:30px;

}

.boton{

display:flex;
align-items:center;
text-decoration:none;
padding:18px 20px;
border-radius:18px;
margin:18px 0;
font-size:22px;
font-weight:bold;
transition:.25s;

}

.boton:hover{

transform:translateY(-3px);

}

.icono{

width:60px;
height:60px;
margin-right:18px;

}

.ml{

background:#FFE600;
color:#222;

}

.tiktok{

background:#111;
color:white;

}

.whatsapp{

background:#25D366;
color:white;

}

.footer{

margin-top:25px;
font-size:15px;
color:#777;

}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>🧦 Calcetas</h1>

<h2>& Tazas Personalizadas</h2>

<div class="descripcion">

Calidad Premium<br>
Envíos a todo México 🇲🇽

</div>

<a class="boton ml"
href="https://www.mercadolibre.com.mx/pagina/noiv#from=share_eshop"
target="_blank">

<img src="mercadolibre.png" class="icono">

<span>Comprar en Mercado Libre</span>

</a>

<a class="boton tiktok"
href="https://vt.tiktok.com/ZSC6rjF1n/?page=TikTokShop&utm_campaign=client_share&utm_source=more&share_app_id=1233"
target="_blank">

<img src="tiktok.png" class="icono">

<span>Comprar en TikTok Shop</span>

</a>

<a class="boton whatsapp"
href="https://wa.me/525581212447?text=Hola,%20me%20interesan%20sus%20productos."
target="_blank">

<img src="whatsapp.png" class="icono">

<span>Enviar WhatsApp</span>

</a>

<div class="footer">

⭐ Gracias por apoyar nuestro emprendimiento ⭐

</div>

</div>

</body>
</html>
