.boton{

    align-items:center;
    text-decoration:none;
    border-radius:20px;
    padding:18px;
    margin-bottom:18px;
    transition:.3s;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 10px 20px rgba(0,0,0,.12);

}

.boton:hover{

    transform:translateY(-4px);

}

.icono{

    width:62px;
    height:62px;
    margin-right:18px;

}

.ml{

    background:#FFE600;
    color:#222;

}

.tiktok{

    background:#000;
    color:#fff;

}

.whatsapp{

    background:#25D366;
    color:white;

}

.texto{

    flex:1;

}

.flecha{

    font-size:28px;

}

.footer{

    text-align:center;
    padding:25px;
    color:#777;
    font-size:15px;
    border-top:1px solid #eee;
    line-height:1.7;

}

</head>
