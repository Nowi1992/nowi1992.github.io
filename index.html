<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaSox</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    width:340px;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h1{
    margin:10px 0;
    color:#222;
}

p{
    color:#666;
    margin-bottom:30px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.ml{
    background:#FFE600;
    color:#333;
}

.tiktok{
    background:#000;
}

.whatsapp{
    background:#25D366;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#999;
}
</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo" alt="NovaSox">

<h1>NovaSox</h1>

<p>¡Compra nuestros productos en la plataforma que prefieras!</p>

<a class="btn ml"
href="https://www.mercadolibre.com.mx/pagina/noiv#from=share_eshop"
target="_blank">
🛒 Mercado Libre
</a>

<a class="btn tiktok"
href="https://vt.tiktok.com/ZSC6rjF1n/?page=TikTokShop&utm_campaign=client_share&utm_source=more&share_app_id=1233"
target="_blank">
🛍️ TikTok Shop
</a>

<a class="btn whatsapp"
href="https://wa.me/TU_NUMERO"
target="_blank">
💬 WhatsApp
</a>

<div class="footer">
Gracias por tu preferencia ❤️
</div>

</div>

</body>
</html>
