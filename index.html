<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaSox</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#101010,#2b2b2b);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;

}

.card{

background:#fff;
width:370px;
border-radius:28px;
padding:35px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.30);

}

.logo{

width:145px;
margin-bottom:15px;

}

h1{

font-size:46px;
color:#222;
margin-bottom:10px;

}

.descripcion{

font-size:18px;
color:#666;
margin-bottom:28px;

}

.boton{

display:flex;
align-items:center;
text-decoration:none;
margin:18px 0;
padding:16px 18px;
border-radius:16px;
font-size:22px;
font-weight:bold;
transition:.25s;
}

.boton:hover{

transform:scale(1.03);

}

.icono{

width:48px;
height:48px;
margin-right:18px;

}

.ml{

background:#FFE600;
color:#222;

}

.tiktok{

background:#000;
color:#fff;

}

.whatsapp{

background:#25D366;
color:#fff;

}

.footer{

margin-top:28px;
font-size:14px;
color:#777;

}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>NovaSox</h1>

<div class="descripcion">
Calcetas Premium<br>
Envíos a todo México 🇲🇽
</div>

<a class="boton ml"
href="https://www.mercadolibre.com.mx/pagina/noiv#from=share_eshop"
target="_blank">

<img src="mercadolibre.png" class="icono">

<span>Comprar en Mercado Libre</span>

</a>

<a class="boton tiktok"
href="https://vt.tiktok.com/ZSC6rjF1n/?page=TikTokShop&utm_campaign=client_share&utm_source=more&share_app_id=1233"
target="_blank">

<img src="tiktok.png" class="icono">

<span>Comprar en TikTok Shop</span>

</a>

<a class="boton whatsapp"
href="https://wa.me/525581212447?text=Hola%20NovaSox,%20me%20interesan%20sus%20productos."
target="_blank">

<img src="whatsapp.png" class="icono">

<span>WhatsApp</span>

</a>

<div class="footer">

Gracias por apoyar a <b>NovaSox</b> ❤️

</div>

</div>

</body>

</html>
