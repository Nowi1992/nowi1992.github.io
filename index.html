<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NovaSox</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#0b0b0b,#2c2c2c);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:25px;

}

.card{

width:430px;
max-width:95%;

background:white;

border-radius:30px;

overflow:hidden;

box-shadow:0 25px 45px rgba(0,0,0,.35);

}

.header{

padding:35px;

text-align:center;

background:linear-gradient(180deg,#ffffff,#f5f5f5);

}

.logo{

width:180px;

margin-bottom:20px;

}

h1{

font-size:42px;

color:#222;

margin-bottom:8px;

}

h2{

font-size:30px;

color:#c69b2d;

font-weight:600;

margin-bottom:20px;

}

.descripcion{

font-size:18px;

color:#666;

line-height:1.6;

}

.botones{

padding:30px;

}

.boton{

display:flex;

align-items:center;

text-decoration:none;

padding:18px 20px;

margin-bottom:18px;

border-radius:20px;

font-size:23px;

font-weight:bold;

transition:.3s;

box-shadow:0 10px 20px rgba(0,0,0,.15);

}

.boton:hover{

transform:translateY(-4px);

}

.icono{

width:64px;

height:64px;

margin-right:20px;

}

.texto{

flex:1;

}

.flecha{

font-size:28px;

}

.ml{

background:#FFE600;

color:#222;

}

.tiktok{

background:#111;

color:white;

}

.whatsapp{

background:#25D366;

color:white;

}

.info{

padding:0 35px 30px;

}

.item{

display:flex;

align-items:center;

margin:12px 0;

font-size:18px;

color:#555;

}

.footer{

text-align:center;

padding:25px;

font-size:15px;

color:#777;

border-top:1px solid #eee;

line-height:1.7;

}

</style>

</head>

<body>

<div class="card">

<div class="header">

<img src="logo.png" class="logo">

<h1>🧦 Calcetas Premium</h1>

<h2>☕ Tazas Personalizadas</h2>

<div class="descripcion">

Diseños exclusivos<br>

Calidad Premium<br>

Envíos a todo México 🇲🇽

</div>

</div>

<div class="botones">

<a class="boton ml"

href="https://www.mercadolibre.com.mx/pagina/noiv#from=share_eshop"

target="_blank">

<img src="mercadolibre.png" class="icono">

<div class="texto">

Comprar en Mercado Libre

</div>

<div class="flecha">→</div>

</a>

<a class="boton tiktok"

href="https://vt.tiktok.com/ZSC6rjF1n/?page=TikTokShop&utm_campaign=client_share&utm_source=more&share_app_id=1233"

target="_blank">

<img src="tiktok.png" class="icono">

<div class="texto">

Comprar en TikTok Shop

</div>

<div class="flecha">→</div>

</a>

<a class="boton whatsapp"

href="https://wa.me/525581212447?text=Hola,%20me%20interesan%20sus%20productos."

target="_blank">

<img src="whatsapp.png" class="icono">

<div class="texto">

Cotiza por WhatsApp

</div>

<div class="flecha">→</div>

</a>

</div>

<div class="info">

<div class="item">⭐ Productos de calidad</div>

<div class="item">🚚 Envíos a todo México</div>

<div class="item">🔒 Compra segura</div>

</div>

<div class="footer">

❤️ Gracias por tu preferencia ❤️

<br>

<b>NovaSox</b>

</div>

</div>

</body>

</html>
